<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SAMA — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc;
        color: #334155;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 320px;
      }
      .badge {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: #2447d0;
        margin: 0 auto 16px;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        color: #64748b;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge"></div>
      <h1>Você está offline</h1>
      <p>
        Sem conexão no momento. Assim que a internet voltar, recarregue para
        continuar usando o SAMA.
      </p>
    </div>
  </body>
</html>
